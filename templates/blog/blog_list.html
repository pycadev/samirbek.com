{% extends 'base.html' %}

{% block title %}Engineering Blog | Samirbek{% endblock %}

{% block content %}
<section class="max-w-4xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-8">
        <div>
            <h1 class="text-5xl font-extrabold tracking-tight mb-4">Engineering Blog</h1>
            <p class="text-gray-500 text-lg">Tizimlar, arxitektura va muhandislik madaniyati haqida.</p>
        </div>
        <a href="{% url 'blog:post_create' %}" class="px-6 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/20 flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            Yangi Blog
        </a>
    </div>

    <!-- Search Section -->
    <div class="mb-12">
        <div class="relative max-w-lg mx-auto">
            <input type="text" 
                   name="q" 
                   placeholder="Maqolalarni qidirish..." 
                   class="w-full px-5 py-3 pl-12 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                   hx-get="{% url 'blog:blog_list' %}"
                   hx-trigger="keyup changed delay:500ms"
                   hx-target="#post-list"
                   hx-indicator=".htmx-indicator">
            <svg class="absolute left-4 top-3.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <div class="htmx-indicator absolute right-4 top-3.5">
                <svg class="animate-spin h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </div>
        </div>
    </div>

    <div id="post-list" class="space-y-12">
        {% include 'blog/partials/post_list_partial.html' %}
    </div>
</section>
{% endblock %}
